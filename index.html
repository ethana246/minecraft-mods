<!DOCTYPE html>
<html>
<head>

    .card { background:#1e293b; padding:15px; border-radius:10px; }
    a { display:inline-block; margin-top:10px; padding:10px; background:lime; color:black; text-decoration:none; border-radius:8px; }
  </style>
</head>

<body>

<header>
  <h1>🔥 Minecraft Mods Hub</h1>
  <p>Download crazy mods</p>
</header>

<div class="grid">

  <div class="card">
    <h2>💣 Lucky Block Chaos</h2>
    <p>Insane random explosions and drops.</p>
    <a href="https://www.curseforge.com/minecraft">Download</a>
  </div>

  <div class="card">
    <h2>🔥 OP Weapons Mod</h2>
    <p>Super powerful weapons and tools.</p>
    <a href="https://www.curseforge.com/minecraft">Download</a>
  </div>

  <div class="card">
    <h2>😂 Funny Mobs</h2>
    <p>Crazy mob behavior and chaos.</p>
    <a href="https://www.curseforge.com/minecraft">Download</a>
  </div>

</div>

</body>
</html>
